name: Daily GAM Refresh

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache node modules and Puppeteer
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/puppeteer
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run GAM data refresh
        run: node scripts/refresh.js
        env:
          GAM_NETWORK_CODE: ${{ secrets.GAM_NETWORK_CODE }}
          GAM_CLIENT_ID: ${{ secrets.GAM_CLIENT_ID }}
          GAM_CLIENT_SECRET: ${{ secrets.GAM_CLIENT_SECRET }}
          GAM_REFRESH_TOKEN: ${{ secrets.GAM_REFRESH_TOKEN }}

      - name: Capture new screenshots
        run: node scripts/screenshot-refresh.js

      - name: Commit and push updated data and screenshots
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add public/data/ public/screenshots/
          git diff --staged --quiet || git commit -m "chore: auto-refresh GAM data and screenshots [skip ci]"
          git push
