name: Daily GAM Refresh

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run GAM data refresh
        run: node scripts/refresh.js
        env:
          GAM_NETWORK_CODE: ${{ secrets.GAM_NETWORK_CODE }}
          GAM_CLIENT_ID: ${{ secrets.GAM_CLIENT_ID }}
          GAM_CLIENT_SECRET: ${{ secrets.GAM_CLIENT_SECRET }}
          GAM_REFRESH_TOKEN: ${{ secrets.GAM_REFRESH_TOKEN }}

      - name: Commit and push updated data
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "chore: auto-refresh GAM data [skip ci]"
          git push
